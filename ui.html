<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    select { width: 100%; padding: 6px; margin-bottom: 10px; font-size: 14px; }
    .dropdown-container { margin-bottom: 8px; }
    #refreshBtn {
      flex-shrink: 0; padding: 6px 12px; font-size: 13px; background: #f0f0f0; color: #333;
      border: 1px solid #ccc; border-radius: 6px; cursor: pointer; white-space: nowrap;
    }
    #refreshBtn:hover { background: #e5e5e5; border-color: #aaa; }
    #readback { background: #f5f5f5; border-radius: 6px; padding: 10px 12px; margin-bottom: 10px; }
    #readback h3 { margin: 0 0 8px; font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: .5px; }
    #modeValue { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px 12px; font-size: 13px; color: #1a1a1a; font-weight: 500; word-break: break-all; min-height: 20px; margin-bottom: 10px; }
    .mode-checkbox-dropdown { position: relative; margin-bottom: 8px; }
    .mode-checkbox-trigger {
      width: 100%; padding: 6px 10px; font-size: 14px; border: 1px solid #ccc;
      border-radius: 6px; background: #fff; cursor: pointer; text-align: left;
      display: flex; justify-content: space-between; align-items: center;
      box-sizing: border-box;
    }
    .mode-checkbox-trigger:hover { border-color: #aaa; }
    .mode-checkbox-trigger.open { border-color: #18a0fb; border-radius: 6px 6px 0 0; }
    .mode-checkbox-trigger .arrow { font-size: 10px; color: #888; }
    .mode-checkbox-list {
      display: none; position: absolute; width: 100%; background: #fff;
      border: 1px solid #18a0fb; border-top: none; border-radius: 0 0 6px 6px;
      z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .mode-checkbox-list.open { display: block; }
    .mode-checkbox-item {
      display: flex; align-items: center; gap: 8px; padding: 7px 10px;
      font-size: 13px; cursor: pointer; border-bottom: 1px solid #f0f0f0;
    }
    .mode-checkbox-item:last-child { border-bottom: none; }
    .mode-checkbox-item:hover { background: #f5f9ff; }
    .mode-checkbox-item.select-all { font-weight: 600; background: #fafafa; border-bottom: 1px solid #e0e0e0 !important; }
    .mode-checkbox-item input[type="checkbox"] { width: 14px; height: 14px; accent-color: #18a0fb; cursor: pointer; flex-shrink: 0; }
    #applyBtn {
      width: 100%; padding: 8px; font-size: 14px; background: #1bc47d; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; margin-top: 4px;
    }
    #applyBtn:hover { background: #17a86b; }
    #applyBtn:disabled { background: #aaa; cursor: default; }
    #applyStatus { font-size: 12px; color: #1bc47d; text-align: center; margin-top: 6px; min-height: 16px; }
    .rb-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; border-bottom: 1px solid #e8e8e8; }
    .rb-row:last-child { border-bottom: none; }
    .rb-label { color: #888; }
    .rb-value { color: #1a1a1a; font-weight: 500; max-width: 60%; text-align: right; word-break: break-all; }
  </style>
</head>
<body>
  <div id="collectionSection" class="dropdown-container" style="display: flex; align-items: flex-end; gap: 8px;">
    <div style="flex: 1;">
      <h3>Collection</h3>
      <select id="collectionDropdown"></select>
    </div>
  </div>

  <div id="noCollectionsMessage" style="display: none; padding: 12px; color: #666; font-size: 13px;">
    There are no variable collections in this file.
    <button type="button" id="refreshBtnEmpty" style="margin-top: 8px; padding: 6px 12px; font-size: 13px; background: #f0f0f0; border: 1px solid #ccc; border-radius: 6px; cursor: pointer;">↻ Refresh</button>
  </div>

  <div id="pathDropdownsContainer">
    <!-- Dynamic path dropdowns (Level 1, Level 2, ...) are appended here -->
  </div>

  <div id="readback" style="display:none">
    <h3>Readback</h3>
    <div id="readbackContent"></div>
  </div>

  <div class="dropdown-container" id="modeContainer" style="display:none">
    <h3>Source Mode</h3>
    <select id="modeDropdown"></select>
    <div id="modeValue"></div>
    <button id="refreshBtn" type="button" title="Refresh collections and current variable">↻ Refresh</button>


    <h3>Apply To</h3>
    <div class="mode-checkbox-dropdown">
      <button class="mode-checkbox-trigger" id="modeCheckboxTrigger">
        <span id="modeCheckboxLabel">All modes selected</span>
        <span class="arrow">▼</span>
      </button>
      <div class="mode-checkbox-list" id="modeCheckboxList">
        <label class="mode-checkbox-item select-all">
          <input type="checkbox" id="selectAllModes" checked>
          Select All
        </label>
      </div>
    </div>

    <button id="applyBtn">Apply to Selected Modes</button>
    <div id="applyStatus"></div>
  </div>

<script>
const collectionDropdown = document.getElementById("collectionDropdown");
const pathDropdownsContainer = document.getElementById("pathDropdownsContainer");
const readback = document.getElementById("readback");
const readbackContent = document.getElementById("readbackContent");
const modeContainer = document.getElementById("modeContainer");
const modeDropdown = document.getElementById("modeDropdown");
const modeValue = document.getElementById("modeValue");
const modeCheckboxTrigger = document.getElementById("modeCheckboxTrigger");
const modeCheckboxList = document.getElementById("modeCheckboxList");
const modeCheckboxLabel = document.getElementById("modeCheckboxLabel");
const selectAllModes = document.getElementById("selectAllModes");
const applyBtn = document.getElementById("applyBtn");
const applyStatus = document.getElementById("applyStatus");
const refreshBtn = document.getElementById("refreshBtn");


let collections = [];
let tree = new Map();
let pathDropdowns = []; // array of <select> elements, one per path level
let currentVariableId = null;
let modeRawValues = [];
let modeData = []; // { modeId, mode, value, rawValue }

// Toggle checkbox dropdown open/close
modeCheckboxTrigger.addEventListener("click", () => {
  const isOpen = modeCheckboxList.classList.toggle("open");
  modeCheckboxTrigger.classList.toggle("open", isOpen);
});

// Close checkbox dropdown when clicking outside
document.addEventListener("click", (e) => {
  if (!modeCheckboxTrigger.contains(e.target) && !modeCheckboxList.contains(e.target)) {
    modeCheckboxList.classList.remove("open");
    modeCheckboxTrigger.classList.remove("open");
  }
});

function updateCheckboxLabel() {
  const all = modeCheckboxList.querySelectorAll(".mode-item-cb");
  const checked = modeCheckboxList.querySelectorAll(".mode-item-cb:checked");
  if (checked.length === 0) {
    modeCheckboxLabel.textContent = "No modes selected";
  } else if (checked.length === all.length) {
    modeCheckboxLabel.textContent = "All modes selected";
  } else {
    modeCheckboxLabel.textContent = `${checked.length} of ${all.length} modes selected`;
  }
  selectAllModes.checked = checked.length === all.length;
  selectAllModes.indeterminate = checked.length > 0 && checked.length < all.length;
}

selectAllModes.addEventListener("change", () => {
  modeCheckboxList.querySelectorAll(".mode-item-cb").forEach(cb => {
    cb.checked = selectAllModes.checked;
  });
  updateCheckboxLabel();
});

// Receive collections from plugin
onmessage = (event) => {
  const msg = event.data.pluginMessage;

  if (msg.type === "collections") {
    collections = msg.collections;

    const collectionSection = document.getElementById("collectionSection");
    const noCollectionsMessage = document.getElementById("noCollectionsMessage");

    if (msg.collections.length === 0) {
      collectionSection.style.display = "none";
      noCollectionsMessage.style.display = "block";
      pathDropdownsContainer.innerHTML = "";
      pathDropdowns = [];
      readback.style.display = "none";
      modeContainer.style.display = "none";
      currentVariableId = null;
      return;
    }

    noCollectionsMessage.style.display = "none";
    collectionSection.style.display = "flex";

    collectionDropdown.innerHTML = "";
    msg.collections.forEach(c => {
      const option = document.createElement("option");
      option.value = c.id;
      option.textContent = c.name;
      collectionDropdown.appendChild(option);
    });

    collectionDropdown.dispatchEvent(new Event("change"));

    if (currentVariableId) {
      parent.postMessage({ pluginMessage: { type: "read-variable", variableId: currentVariableId } }, "*");
    }
  }

  if (msg.type === "variable-readback") {
    readbackContent.innerHTML = "";
    const typeLabels = { FLOAT: "Number", COLOR: "Color", STRING: "String", BOOLEAN: "Boolean" };
const rows = [
  ["Name", msg.name],
  ["Type", typeLabels[msg.resolvedType] ?? msg.resolvedType],
];
    rows.forEach(([label, value]) => {
      const row = document.createElement("div");
      row.className = "rb-row";
      row.innerHTML = `<span class="rb-label">${label}</span><span class="rb-value">${value}</span>`;
      readbackContent.appendChild(row);
    });
    readback.style.display = "block";

    currentVariableId = msg.id;
    modeData = msg.values;
    modeRawValues = msg.values.map(v => v.rawValue);

    // Populate source mode dropdown
    modeDropdown.innerHTML = "";
    msg.values.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v.value;
      opt.textContent = v.mode;
      modeDropdown.appendChild(opt);
    });
    modeValue.textContent = msg.values[0]?.value ?? "";

    // Populate checkbox list (remove old mode items, keep Select All)
    // Only include modes that are writable (not locked behind a paid plan)
    modeCheckboxList.querySelectorAll(".mode-checkbox-item:not(.select-all)").forEach(el => el.remove());
    msg.values.forEach(v => {
      if (!v.writable) return;
      const label = document.createElement("label");
      label.className = "mode-checkbox-item";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.className = "mode-item-cb";
      cb.value = v.modeId;
      cb.checked = true;
      cb.addEventListener("change", updateCheckboxLabel);
      label.appendChild(cb);
      label.appendChild(document.createTextNode(v.mode));
      modeCheckboxList.appendChild(label);
    });
    selectAllModes.checked = true;
    selectAllModes.indeterminate = false;
    modeCheckboxLabel.textContent = "All modes selected";

    applyStatus.textContent = "";
    applyBtn.disabled = false;
    modeContainer.style.display = "block";
  }

  if (msg.type === "apply-complete") {
    applyBtn.disabled = false;
    applyStatus.textContent = "✓ Applied successfully";
    setTimeout(() => { applyStatus.textContent = ""; }, 3000);
  }
};

// Build tree from variable names
function buildVariableTree(variables) {
  const tree = new Map();
  variables.forEach(v => {
    const parts = v.name.split("/");
    let current = tree;
    parts.forEach((part, index) => {
      if (!current.has(part)) current.set(part, { name: part, children: new Map() });
      if (index === parts.length - 1) current.get(part).id = v.id;
      current = current.get(part).children;
    });
  });
  return tree;
}

// Populate dropdown from Map
function populateDropdown(dropdown, nodeMap) {
  dropdown.innerHTML = "";
  nodeMap.forEach((node, key) => {
    const option = document.createElement("option");
    option.value = key;
    option.textContent = key;
    dropdown.appendChild(option);
  });
}

// Walk tree from root using selected keys; returns the node at that path or null
function getNodeAtPath(pathKeys) {
  if (!pathKeys.length) return null;
  let current = tree;
  let node = null;
  for (const key of pathKeys) {
    if (!current || !current.has(key)) return null;
    node = current.get(key);
    current = node.children;
  }
  return node;
}

// Remove path dropdowns and their containers after index n
function truncateDropdownsTo(n) {
  while (pathDropdowns.length > n) {
    const wrap = pathDropdowns.pop();
    if (wrap && wrap.parentNode) wrap.parentNode.remove();
  }
}

// Default label for path level: Group, Sub-Group 1, Sub-Group 2, ...
function getPathLevelLabel(level, labelOverride) {
  if (labelOverride) return labelOverride;
  return level === 0 ? "Group" : `Sub-Group ${level}`;
}

// Create and append one path dropdown at the given level (0-based). Optional labelOverride (e.g. "Variable" for the leaf level).
function ensurePathDropdown(level, labelOverride) {
  if (pathDropdowns[level]) {
    const existing = pathDropdowns[level];
    if (existing.parentNode) {
      const h3 = existing.parentNode.querySelector("h3");
      if (h3) h3.textContent = getPathLevelLabel(level, labelOverride);
    }
    return pathDropdowns[level];
  }
  const label = getPathLevelLabel(level, labelOverride);
  const wrap = document.createElement("div");
  wrap.className = "dropdown-container";
  wrap.innerHTML = `<h3>${label}</h3><select class="path-dropdown" data-level="${level}"></select>`;
  const dropdown = wrap.querySelector("select");
  dropdown.addEventListener("change", () => onPathDropdownChange(level));
  pathDropdownsContainer.appendChild(wrap);
  pathDropdowns[level] = dropdown;
  return dropdown;
}

// Hide readback and mode UI
function hideReadbackAndMode() {
  readback.style.display = "none";
  modeContainer.style.display = "none";
}

// Called when any path dropdown selection changes
function onPathDropdownChange(changedLevel) {
  truncateDropdownsTo(changedLevel + 1);
  const pathKeys = pathDropdowns.map(d => d.value).filter(Boolean);
  const node = getNodeAtPath(pathKeys);
  if (!node) {
    hideReadbackAndMode();
    return;
  }
  if (node.id !== undefined) {
    hideReadbackAndMode();
    parent.postMessage({ pluginMessage: { type: "variable-selected", variableId: node.id } }, "*");
    parent.postMessage({ pluginMessage: { type: "read-variable", variableId: node.id } }, "*");
    return;
  }
  if (node.children.size > 0) {
    const nextLevel = changedLevel + 1;
    const allLeaves = Array.from(node.children.values()).every(child => child.id !== undefined);
    const nextLabel = allLeaves ? "Variable" : null;
    const nextDropdown = ensurePathDropdown(nextLevel, nextLabel);
    populateDropdown(nextDropdown, node.children);
    nextDropdown.style.display = "";
    nextDropdown.dispatchEvent(new Event("change"));
  } else {
    hideReadbackAndMode();
  }
}

// Get the currently selected node (leaf or folder) from path dropdowns
function getSelectedLeafNode() {
  const pathKeys = pathDropdowns.map(d => d.value).filter(Boolean);
  return getNodeAtPath(pathKeys);
}

// Refresh — re-fetch collections (and current variable readback if one is loaded)
function doRefresh() {
  parent.postMessage({ pluginMessage: { type: "refresh" } }, "*");
}
refreshBtn.addEventListener("click", doRefresh);
const refreshBtnEmpty = document.getElementById("refreshBtnEmpty");
if (refreshBtnEmpty) refreshBtnEmpty.addEventListener("click", doRefresh);

// Collection change
collectionDropdown.addEventListener("change", () => {
  const selectedCollection = collections.find(c => c.id === collectionDropdown.value);
  if (!selectedCollection) return;

  tree = buildVariableTree(selectedCollection.variables);

  truncateDropdownsTo(0);
  pathDropdowns = [];
  pathDropdownsContainer.innerHTML = "";
  hideReadbackAndMode();
  applyStatus.textContent = "";

  if (tree.size > 0) {
    const first = ensurePathDropdown(0);
    populateDropdown(first, tree);
    first.dispatchEvent(new Event("change"));
  }
});

// Mode dropdown change — updates displayed value
modeDropdown.addEventListener("change", () => {
  modeValue.textContent = modeDropdown.value;
  applyStatus.textContent = "";
});

// Apply to Selected Modes button
applyBtn.addEventListener("click", () => {
  if (!currentVariableId) return;
  const rawValue = modeRawValues[modeDropdown.selectedIndex];
  if (rawValue === undefined) return;

  const checkedModeIds = Array.from(
    modeCheckboxList.querySelectorAll(".mode-item-cb:checked")
  ).map(cb => cb.value);

  if (checkedModeIds.length === 0) {
    applyStatus.textContent = "No modes selected.";
    return;
  }

  applyBtn.disabled = true;
  applyStatus.textContent = "Applying…";

  parent.postMessage({
    pluginMessage: {
      type: "apply-to-modes",
      variableId: currentVariableId,
      modeIds: checkedModeIds,
      rawValue
    }
  }, "*");
});
</script>
</body>
</html>
